<section class="section">
  <div class="container text-center">
    <h2 class="section-label">Get in Touch</h2>
    <h1 class="section-title">Build the Future of Distribution</h1>
    <p class="vision-text">
      We welcome conversations with operators, distributors, retail partners, and technology collaborators who share our vision.
    </p>
  </div>
</section>

<section class="section bg-light">
  <div class="container">
    <div class="contact-form-wrap">
      <div class="card contact-form-card">
        <form action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
          <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
          <input type="hidden" name="subject" value="New Lead from SupplyAi Website">

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="Name" placeholder="Enter your name" required>
          </div>

          <div class="form-group">
            <label>Company</label>
            <input type="text" name="Company" placeholder="Your company name" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="Email" placeholder="work@email.com" required>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" name="Phone" placeholder="(888) 888-8888">
            </div>
          </div>

          <div class="form-group">
            <label>Area of Interest</label>
            <select name="Interest">
              <option value="Wholesale Distribution">Wholesale Distribution</option>
              <option value="Retail Operations">Retail Operations</option>
              <option value="Technology Collaboration">Technology Collaboration</option>
              <option value="Strategic Stakeholder">Strategic Stakeholder</option>
            </select>
          </div>

          <div class="form-group form-group-last">
            <label>Message</label>
            <textarea name="Message" rows="5" placeholder="How can we help?" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary contact-submit-btn">
            Send Secure Message
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
